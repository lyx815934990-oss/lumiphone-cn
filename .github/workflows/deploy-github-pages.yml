# 域名站：从正式仓库 Lumi-Phone 拉代码构建，挂 www.lumiphone.cn
# 主仓部署成功后会自动 workflow_dispatch 本流程；也可在 Actions 里手动 Run
# 主仓改私密后必须配置 secrets.GH_PAT（可读 Lumi-Phone）
name: Deploy GitHub Pages (domain verify)

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-cn
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: lyx815934990-oss/Lumi-Phone
          ref: main
          # 未配置 GH_PAT 时用默认 token（仅主仓仍 Public 可用）；Private 后必须配 GH_PAT
          token: ${{ secrets.GH_PAT || github.token }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm install --no-audit --no-fund
      - name: Write CNAME for www.lumiphone.cn
        run: |
          mkdir -p public
          printf '%s\n' 'www.lumiphone.cn' > public/CNAME
      - run: npm run build
        env:
          CI: true
          COLUMNS: '9999'
          # 自定义域名根路径（勿用 /Lumi-Phone/）
          VITE_BASE: /
          VITE_WEB_PUSH_API_BASE: https://lumi-push.lyx815934990.workers.dev
          VITE_USER_SYSTEM_API_BASE: https://user-system-api.lyx815934990.workers.dev
          VITE_DISCORD_CLIENT_ID: ${{ secrets.VITE_DISCORD_CLIENT_ID }}
          VITE_HF_REMOTE_HOST: ${{ vars.VITE_HF_REMOTE_HOST || 'https://hf-mirror.com/' }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
